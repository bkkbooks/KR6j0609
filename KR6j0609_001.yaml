body:
  text: 東晉天竺三藏竺曇無蘭譯聞如是一時佛遊於羅閲祇國中鸚鵡樹間是時有一異比丘於竹園去羅閲祇國適在中間為蛇所齧復為鬼神所著復為賊所劫見佛爾時即往到是比丘所時玄師颰陀隨佛俱往玄師颰陀即白佛言我有術甚神今欲為呪佛言止止颰陀汝所呪莫令有傷害颰陀白佛言後當國國相攻伐賊賊更相劫相增者復為相劫鬼神更劫毒毒更相害若有比丘在山中樹下坐被五納衣若露地坐四輩弟子當令無有害我者皆令安隱無有病痛如是僧深味尼鬱遮梨首利拔提珊于兮披拔陀泥如是呪斷口語斷諸迷斷諸病痛是諸閲叉皆作是迷須摩菟摩呵一曜沙難摩訶二閲叉梵摩曜摩訶三閲叉因呵羅其摩呵四閲叉呵祇槃摩呵五是諸閲叉在鬼神中尊我字因偷諸欲病者害人者我皆使不知人處障蔽汝眼令不見一切人皆使不得其便當爾之時便呼言來邏持鬼神摩呵邏持鬼神來兜勒摩訶兜勒因持兜羅來梵摩訶兜羅摩訶梵摩兜羅來閲叉兜羅訶多得兜勒首羅俱沙兜勒摩訶首羅沙兜勒我字因偷諸怨家相求便者我皆救之覆蔽兩不相見為繩索所縛鎖械所縛亂意所縛俱歸命佛一切皆解脫歸命佛時南無佛大吉
